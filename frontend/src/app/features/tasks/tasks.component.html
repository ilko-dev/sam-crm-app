<div class="flex flex-column h-full">
    
    <div class="flex justify-content-between align-items-center gap-4 mb-4 shrink-0">
        
        <div class="flex gap-2 flex-1 max-w-30rem">
            <input pInputText type="text" [ngModel]="newTaskTitle()" (ngModelChange)="newTaskTitle.set($event)" (keyup.enter)="addTask()" 
                   placeholder="Що потрібно зробити?" class="w-full border-round-lg p-2 text-base" />
                   
            <p-button icon="pi pi-plus" label="Додати" (onClick)="addTask()" 
                      styleClass="border-round-lg px-3 py-2 p-button-sm"></p-button>
        </div>

        <div class="flex surface-100 border-round-lg p-1 border-1 surface-border">
            <p-button icon="pi pi-list" [text]="viewMode() !== 'list'" [severity]="viewMode() === 'list' ? 'primary' : 'secondary'" 
                      (onClick)="viewMode.set('list')" styleClass="w-2rem h-2rem p-0 border-round-md"></p-button>
            
            <p-button icon="pi pi-table" [text]="viewMode() !== 'table'" [severity]="viewMode() === 'table' ? 'primary' : 'secondary'" 
                      (onClick)="viewMode.set('table')" styleClass="w-2rem h-2rem p-0 border-round-md"></p-button>
            
            <p-button icon="pi pi-th-large" [text]="viewMode() !== 'kanban'" [severity]="viewMode() === 'kanban' ? 'primary' : 'secondary'" 
                      (onClick)="viewMode.set('kanban')" styleClass="w-2rem h-2rem p-0 border-round-md"></p-button>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto pr-2" *ngIf="!isLoading(); else loading">
        
        <div *ngIf="viewMode() === 'list'">
            <div *ngIf="tasks().length === 0" class="text-center text-500 mt-5 text-base">
                Ура! Усі задачі виконано 🎉
            </div>
            
            <div *ngFor="let task of tasks()" 
                 class="bg-white border-1 surface-border border-round-lg p-2 mb-2 flex align-items-center justify-content-between hover:bg-purple-50 transition-colors shadow-none">
                
                <div class="flex align-items-center gap-3 pl-1">
                    <p-checkbox [ngModel]="task.status === TaskStatus.Completed" (ngModelChange)="onTaskStatusChange(task, $event)" [binary]="true" inputId="task-{{task.id}}"></p-checkbox>
                    <label for="task-{{task.id}}" class="text-base cursor-pointer transition-colors" 
                           [class]="task.status === TaskStatus.Completed ? 'line-through text-400' : 'text-700'">
                        {{ task.title }}
                    </label>
                </div>
                
                <div class="flex align-items-center gap-2 pr-1">
                    <p-tag [severity]="getStatusSeverity(task.status)" [value]="getStatusLabel(task.status)" styleClass="text-xs px-2 py-1"></p-tag>
                    
                    <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" 
                              (onClick)="deleteTask(task.id)" styleClass="w-2rem h-2rem p-0"></p-button>
                </div>
            </div>
        </div>

        <div *ngIf="viewMode() === 'table'" class="fadein animation-duration-200">
            <p-table [value]="tasks()" styleClass="p-datatable-sm p-datatable-striped border-1 surface-border border-round-lg">
                
                <ng-template pTemplate="header">
                    <tr>
                        <th style="width: 5rem" class="text-center">Статус</th>
                        <th pSortableColumn="title" style="min-width: 20rem">
                            Назва задачі <p-sortIcon field="title"></p-sortIcon>
                        </th>
                        <th pSortableColumn="status" style="width: 10rem">
                            Статус <p-sortIcon field="status"></p-sortIcon>
                        </th>
                        <th style="width: 5rem" class="text-center">Дії</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-task>
                    <tr>
                        <td class="text-center">
                            <p-checkbox [ngModel]="task.status === TaskStatus.Completed" (ngModelChange)="onTaskStatusChange(task, $event)" [binary]="true" inputId="tbl-task-{{task.id}}"></p-checkbox>
                        </td>
                        <td>
                            <span class="text-base transition-colors" [class]="task.status === TaskStatus.Completed ? 'line-through text-400' : 'text-700 font-medium'">
                                {{ task.title }}
                            </span>
                        </td>
                        <td>
                            <p-tag [severity]="getStatusSeverity(task.status)" [value]="getStatusLabel(task.status)" styleClass="text-xs px-2 py-1"></p-tag>
                        </td>
                        <td class="text-center">
                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" 
                                      (onClick)="deleteTask(task.id)" styleClass="w-2rem h-2rem p-0"></p-button>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center p-4 text-500 text-base">
                            Список порожній. Час відпочити або створити нове завдання!
                        </td>
                    </tr>
                </ng-template>

            </p-table>
        </div>

        <div *ngIf="viewMode() === 'kanban'" class="flex align-items-center justify-content-center h-full text-500">
            Тут буде Канбан-дошка з Drag & Drop 🚀
        </div>

    </div>

    <ng-template #loading>
        <div class="flex align-items-center justify-content-center h-full">
            <p-progressSpinner></p-progressSpinner>
        </div>
    </ng-template>
</div>
