<div class="card p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Завдання (SAM CRM)</h2>
    <p-button label="Нове завдання" icon="pi pi-plus"></p-button>
  </div>

  <p-table [value]="tasks" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Назва</th>
        <th>Статус</th>
        <th>Пріоритет</th>
        <th>Дії</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-task>
      <tr>
        <td>{{ task.id }}</td>
        <td>{{ task.title }}</td>
        <td>
          <span class="p-badge" 
                [ngClass]="{
                  'status-new': task.status === 'New',
                  'status-wip': task.status === 'In Progress'
                }">
            {{ task.status }}
          </span>
        </td>
        <td>{{ task.priority }}</td>
        <td>
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
